---
# CiliumBGPPeerConfig — default peer configuration with TCP MD5 auth (RFC 2385).
# Referenced by CiliumBGPClusterConfig peers via peerConfigRef.
# The authSecretRef points to a k8s Secret in the BGP secrets namespace
# (default: kube-system) that must contain a key named `password` with the
# shared MD5 key. On the GoBGP side, the matching key is set in
# gobgp/gobgpd.toml as `auth-password = "..."` under each [neighbors.config].
# Create the secret with: make gobgp-auth-secret
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: gobgp-default
spec:
  ebgpMultihop: 1
  authSecretRef: gobgp-auth
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: "bgp"

---
# CiliumBGPClusterConfig — instructs Cilium's BGP Control Plane to instantiate
# a BGP router on every node (nodeSelector is empty = all nodes) with local AS
# 65001, peering with the GoBGP speaker at 172.19.0.10 (AS 65000).
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: gobgp-bgp
spec:
  nodeSelector: {}
  bgpInstances:
    - name: gobgp-instance
      localASN: 65001
      peers:
        - name: gobgp-speaker
          peerASN: 65000
          peerAddress: "172.19.0.10"
          peerConfigRef:
            name: gobgp-default

---
# CiliumBGPAdvertisement — advertise LoadBalancer Service IPs to the FRR peer.
# PodCIDR is NOT advertised because Cilium uses VXLAN overlay for pod-to-pod
# traffic — external traffic reaches pods via LoadBalancer Services only.
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: gobgp-advert
  labels:
    advertise: bgp
spec:
  advertisements:
    # Advertise LoadBalancer service IPs (including those assigned by Cilium).
    # NOTE: selector is required — without it no services match. The NotIn
    # expression below matches ALL services (a documented Cilium idiom).
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          - {key: somekey, operator: NotIn, values: ['never-used-value']}
