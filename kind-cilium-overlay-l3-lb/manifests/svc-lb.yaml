---
# Sample LoadBalancer Service for end-to-end testing of the
# Cilium → GoBGP LB IP advertisement path.
#
# With `CiliumLoadBalancerIPPool/gobgp-lb-pool` applied (range
# 172.19.0.200-220), Cilium will allocate a LoadBalancer IP from that pool
# automatically — no annotation needed. The IP shows up under
# `status.loadBalancer.ingress[*].ip`.
#
# The `CiliumBGPAdvertisement/gobgp-advert` (in cilium-bgp.yaml) then
# advertises that IP to the GoBGP speaker at 172.19.0.10. Verify with:
#   kubectl --kubeconfig ./.kubeconfig/kubeconfig.yaml get svc test-lb
#   make gobgp-routes
#   docker exec gobgp-speaker /go/bin/gobgp global rib
#
# Notes:
# - The `app: test` selector targets pods you'd create separately
#   (e.g. `kubectl run test --image=nginx --labels=app=test --port=80`).
# - Without matching pods, the BGP route is still advertised (Cilium
#   advertises the Service VIP regardless of endpoint state). End-to-end
#   connectivity requires the pods to exist and be Ready.
# - `externalTrafficPolicy: Cluster` (default) → all nodes advertise the
#   route (ECMP from GoBGP's POV). Switch to `Local` to withdraw the
#   route from nodes with no local endpoint.
apiVersion: v1
kind: Service
metadata:
  name: test-lb
  labels:
    app: test
spec:
  type: LoadBalancer
  selector:
    app: test
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
