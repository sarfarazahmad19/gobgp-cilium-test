! frr.conf — FRR2 TOR-Cluster BGP speaker config
!
! Peers with Cilium's BGP Control Plane on every kind worker node over
! bgp-net (172.19.0.0/16) and with FRR1 (TOR-Client) over the transit network
! (transit-net 172.23.0.0/24). Uses next-hop-self so FRR1 sends traffic
! through this TOR-Cluster router rather than attempting direct forwarding.
!
! Topology:
!   FRR2 TOR-Cluster (AS 65000)
!     ├── bgp-net: 172.19.0.10
!     │     ├── eBGP -> overlay-l3-bgp-worker  172.19.0.4 AS 65001
!     │     └── eBGP -> overlay-l3-bgp-worker2 172.19.0.5 AS 65001
!     └── transit-net: 172.23.0.2
!           └── eBGP -> FRR1 TOR-Client 172.23.0.1 AS 65100
!
frr version 8.4
frr defaults traditional
!
router bgp 65000
  bgp router-id 172.19.0.10
  no bgp ebgp-requires-policy
  neighbor 172.19.0.4 remote-as 65001
  neighbor 172.19.0.4 timers 3 9
  neighbor 172.19.0.4 password bgp-md5-secret-2026
  neighbor 172.19.0.5 remote-as 65001
  neighbor 172.19.0.5 timers 3 9
  neighbor 172.19.0.5 password bgp-md5-secret-2026
  neighbor 172.23.0.1 remote-as 65100
  !
  address-family ipv4 unicast
    neighbor 172.19.0.4 activate
    neighbor 172.19.0.5 activate
    neighbor 172.23.0.1 activate
    neighbor 172.23.0.1 next-hop-self
  exit-address-family
!
