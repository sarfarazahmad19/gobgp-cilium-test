! frr.conf — FRR BGP speaker config
!
! Peers with Cilium's BGP Control Plane on every kind worker node.
! Control-plane node is excluded from BGP and LB pool — workers only.
! Zebra installs learned routes into the kernel FIB so LB Service IPs
! are reachable directly from this container.
!
! Topology:
!   FRR (AS 65000, 172.19.0.10)
!     ├── peer -> overlay-l3-bgp-worker  172.19.0.4 AS 65001
!     └── peer -> overlay-l3-bgp-worker2 172.19.0.5 AS 65001
!
frr version 8.4
frr defaults traditional
!
router bgp 65000
  bgp router-id 172.19.0.10
  no bgp ebgp-requires-policy
  neighbor 172.19.0.4 remote-as 65001
  neighbor 172.19.0.4 timers 3 9
  neighbor 172.19.0.4 password bgp-md5-secret-2026
  neighbor 172.19.0.5 remote-as 65001
  neighbor 172.19.0.5 timers 3 9
  neighbor 172.19.0.5 password bgp-md5-secret-2026
  !
  address-family ipv4 unicast
    neighbor 172.19.0.4 activate
    neighbor 172.19.0.5 activate
  exit-address-family
!
