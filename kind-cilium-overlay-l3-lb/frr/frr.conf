! frr.conf — FRR BGP speaker config
!
! Replaces the previous GoBGP speaker. Peers with Cilium's BGP Control Plane
! on every kind node. Zebra installs learned routes into the kernel FIB so
! LB Service IPs are reachable directly from this container.
!
! Topology:
!   FRR (AS 65000, 172.19.0.10)
!     ├── peer -> gobgp-control-plane 172.19.0.3 AS 65001
!     └── peer -> gobgp-worker         172.19.0.4 AS 65001
!
frr version 8.4
frr defaults traditional
!
router bgp 65000
  bgp router-id 172.19.0.10
  no bgp ebgp-requires-policy
  neighbor 172.19.0.3 remote-as 65001
  neighbor 172.19.0.3 password gobgp-md5-secret-2026
  neighbor 172.19.0.4 remote-as 65001
  neighbor 172.19.0.4 password gobgp-md5-secret-2026
  !
  address-family ipv4 unicast
    neighbor 172.19.0.3 activate
    neighbor 172.19.0.4 activate
  exit-address-family
!
