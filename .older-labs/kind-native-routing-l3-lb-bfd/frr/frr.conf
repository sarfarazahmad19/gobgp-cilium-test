! frr.conf — FRR2 TOR-Cluster BGP+BFD speaker config
!
! Peers with kube-router (BGP+BFD) running as a DaemonSet on every kind
! worker node over bgp-net (172.19.0.0/16) and with FRR1 (TOR-Client) over
! the transit network (transit-net 172.23.0.0/24). Uses next-hop-self so
! FRR1 sends traffic through this TOR-Cluster router rather than attempting
! direct forwarding.
!
! Why BFD: kube-router's underlying GoBGP speaker supports BFD, while
! Cilium's own BGP Control Plane (used by the sibling kind-native-routing-l3-lb
! lab) does NOT. BFD gives sub-second failover instead of the ~5-9s failover
! produced by BGP hold timers.
!
! Topology:
!   FRR2 TOR-Cluster (AS 65000)
!     ├── bgp-net: 172.19.0.10
!     │     ├── eBGP+BFD -> overlay-l3-bgp-bfd-worker  172.19.0.4 AS 65001 (kube-router)
!     │     └── eBGP+BFD -> overlay-l3-bgp-bfd-worker2 172.19.0.5 AS 65001 (kube-router)
!     └── transit-net: 172.23.0.2
!           └── eBGP -> FRR1 TOR-Client 172.23.0.1 AS 65100
!
! MD5 auth is intentionally OFF for the first iteration (matches the
! original lab's pre-MD5 baseline). kube-router reads the shared key from
! a CLI flag and we want to iterate fast. Add it back later by setting
! `neighbor <ip> password <secret>` here and `--peer-password=<secret>`
! on kube-router.
!
frr version 8.4
frr defaults traditional
!
router bgp 65000
  bgp router-id 172.19.0.10
  no bgp ebgp-requires-policy
  neighbor 172.19.0.4 remote-as 65001
  neighbor 172.19.0.4 timers 3 9
  neighbor 172.19.0.4 bfd
  neighbor 172.19.0.5 remote-as 65001
  neighbor 172.19.0.5 timers 3 9
  neighbor 172.19.0.5 bfd
  neighbor 172.23.0.1 remote-as 65100
  !
  address-family ipv4 unicast
    neighbor 172.19.0.4 activate
    neighbor 172.19.0.5 activate
    neighbor 172.23.0.1 activate
    neighbor 172.23.0.1 next-hop-self
  exit-address-family
!
! BFD peer configuration — sub-second failure detection.
! minimum-tx / minimum-rx are in milliseconds. With detect-multiplier 3
! and 300ms intervals, the failure upper bound is ~900ms.
bfd
  peer 172.19.0.4
    minimum-tx-interval 300
    minimum-rx-interval 300
    detect-multiplier 3
  !
  peer 172.19.0.5
    minimum-tx-interval 300
    minimum-rx-interval 300
    detect-multiplier 3
  !
!
line vty