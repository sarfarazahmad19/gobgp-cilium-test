! frr1.conf — FRR TOR-Client speaker
!
! Acts as the client's default gateway (client-net 172.21.0.0/24) and
! peers with the TOR-Cluster FRR (frr2) over a dedicated transit L2 segment
! (transit-net 172.23.0.0/24). Not on bgp-net — only reaches the K8s
! cluster through FRR2. Advertises client-net to FRR2 for DSR return path.
!
! Topology:
!   FRR1 (AS 65100)
!     ├── client-net: 172.21.0.10
!     └── transit-net: 172.23.0.1
!           └── eBGP -> FRR2 TOR-Cluster 172.23.0.2 AS 65000
!
frr version 8.4
frr defaults traditional
!
router bgp 65100
  bgp router-id 172.23.0.1
  no bgp ebgp-requires-policy
  neighbor 172.23.0.2 remote-as 65000
  !
  address-family ipv4 unicast
    network 172.21.0.0/24
    neighbor 172.23.0.2 activate
  exit-address-family
!
line vty
