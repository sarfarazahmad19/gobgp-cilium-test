# gobgpd.toml — GoBGP speaker config
#
# This speaker runs on the shared gobgp-net Docker bridge and peers with
# Cilium's BGP Control Plane on every kind node.
#
# Topology:
#   GoBGP (AS 65000, 172.19.0.10)
#     ├── peer → gobgp-control-plane 172.19.0.4  AS 65001
#     └── peer → gobgp-worker         172.19.0.3  AS 65001

[global.config]
  as = 65000
  router-id = "172.19.0.10"
  port = 179

[[neighbors]]
  [neighbors.config]
    neighbor-address = "172.19.0.4"
    peer-as = 65001
  # Accept PodCIDR and Service LoadBalancer routes advertised by Cilium
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "ipv4-unicast"
  # Enable route reflection to propagate between nodes if needed
  [neighbors.route-reflector.config]
    route-reflector-client = false
  # Apply a simple policy: accept any route, set a local-preference
  [neighbors.apply-policy.config]
    default-import-policy = "accept"
    default-export-policy = "accept"

[[neighbors]]
  [neighbors.config]
    neighbor-address = "172.19.0.3"
    peer-as = 65001
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "ipv4-unicast"
  [neighbors.route-reflector.config]
    route-reflector-client = false
  [neighbors.apply-policy.config]
    default-import-policy = "accept"
    default-export-policy = "accept"
