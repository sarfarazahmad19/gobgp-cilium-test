frr defaults datacenter
hostname rack1-tor-b

interface eth1
  ip address 10.99.0.3/31
!
interface eth3
  ip address 10.99.0.6/31
!
interface eth0
  shutdown
!
router bgp 65102
  bgp router-id 10.99.0.3
  no bgp ebgp-requires-policy
  neighbor 10.99.0.2 remote-as 65001
  neighbor 10.99.0.2 timers connect 5
  neighbor 10.99.0.2 bfd
  neighbor 10.99.0.7 remote-as 65200
  neighbor 10.99.0.7 timers connect 5
  neighbor 10.99.0.7 bfd
  address-family ipv4 unicast
    neighbor 10.99.0.2 activate
    neighbor 10.99.0.7 activate
    redistribute connected
  exit-address-family
!
bfd
  peer 10.99.0.2
    detect-multiplier 3
    receive-interval 50
    transmit-interval 50
  peer 10.99.0.7
    detect-multiplier 3
    receive-interval 50
    transmit-interval 50
!
