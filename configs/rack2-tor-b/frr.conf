frr defaults datacenter
hostname rack2-tor-b

interface eth1
  ip address 10.99.0.19/31
!
interface eth3
  ip address 10.99.0.12/31
!
interface eth0
  shutdown
!
router bgp 65102
  bgp router-id 10.99.0.19
  no bgp ebgp-requires-policy
  neighbor 10.99.0.18 remote-as 65001
  neighbor 10.99.0.18 timers connect 5
  neighbor 10.99.0.18 bfd
  neighbor 10.99.0.13 remote-as 65200
  neighbor 10.99.0.13 timers connect 5
  neighbor 10.99.0.13 bfd
  address-family ipv4 unicast
    neighbor 10.99.0.18 activate
    neighbor 10.99.0.13 activate
    redistribute connected
  exit-address-family
!
bfd
  peer 10.99.0.18
    detect-multiplier 3
    receive-interval 50
    transmit-interval 50
  peer 10.99.0.13
    detect-multiplier 3
    receive-interval 50
    transmit-interval 50
!
