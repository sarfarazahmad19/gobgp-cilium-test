# Worker-side LB test (deploys to kube-system — lab, no dedicated namespace).
# nginx (default Pod IP pool, lands on workers) behind a LoadBalancer Service,
# plus a netshoot debug client.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
  namespace: kube-system
  labels:
    bgp-advertise: "lb"
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
# Debug client on the worker side (default Pod IP pool) — exec in to curl the
# nginx-lb VIP, trace routes across the dual-ToR path, etc.
apiVersion: v1
kind: Pod
metadata:
  name: netshoot
  namespace: kube-system
spec:
  containers:
    - name: netshoot
      image: nicolaka/netshoot:v0.13
      command: ["sleep", "infinity"]
