frr defaults datacenter
hostname rack2-tor-a

interface eth1
  ip address 10.99.0.17/31
!
interface eth3
  ip address 10.99.0.10/31
!
interface eth0
  shutdown
!
router bgp 65101
  bgp router-id 10.99.0.17
  no bgp ebgp-requires-policy
  neighbor 10.99.0.16 remote-as 65001
  neighbor 10.99.0.16 timers connect 5
  neighbor 10.99.0.16 bfd
  neighbor 10.99.0.11 remote-as 65200
  neighbor 10.99.0.11 timers connect 5
  neighbor 10.99.0.11 bfd
  address-family ipv4 unicast
    neighbor 10.99.0.16 activate
    neighbor 10.99.0.11 activate
    redistribute connected
  exit-address-family
!
bfd
  peer 10.99.0.16
    detect-multiplier 3
    receive-interval 50
    transmit-interval 50
  peer 10.99.0.11
    detect-multiplier 3
    receive-interval 50
    transmit-interval 50
!
